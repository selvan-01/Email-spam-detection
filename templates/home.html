<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page Title -->
    <title>Spam Detector</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='spam-favicon.ico') }}">

    <!-- External CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">

    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/5f3f547070.js" crossorigin="anonymous"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ================= HEADER SECTION ================= -->
    <div class="container">
        <!-- Main Heading -->
        <h2 class="container-heading">Spam Detector</h2>

        <!-- Description -->
        <div class="description">
            <p>
                Enter your message below to check whether it is 
                <strong>Spam</strong> or <strong>Not Spam</strong>.
            </p>
        </div>
    </div>

    <!-- ================= INPUT FORM SECTION ================= -->
    <div class="ml-container">

        <!-- Form sends data to Flask 'predict' route -->
        <form action="{{ url_for('predict') }}" method="POST">

            <!-- Textarea for user input -->
            <textarea 
                class="message-box" 
                name="message" 
                rows="15" 
                cols="75"
                placeholder="Enter your message here...
Example:
- Let's catch up tonight
- You have a meeting tomorrow
- Claim your reward now by entering code ALLYSON30"
                required>
            </textarea>

            <br/>

            <!-- Submit Button -->
            <input 
                type="submit" 
                class="my-cta-button" 
                value="Predict Message"
            >
        </form>
    </div>

</body>
</html>
