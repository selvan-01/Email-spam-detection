<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Spam Detection Result</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='spam-favicon.ico') }}">

    <!-- External CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">

    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/5f3f547070.js" crossorigin="anonymous"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ================= HEADER SECTION ================= -->
    <div class="container">

        <!-- Main Heading -->
        <h2 class="container-heading">Spam Detector</h2>

        <!-- Description -->
        <div class="description">
            <p>Here is the prediction result for your message 👇</p>
        </div>
    </div>

    <!-- ================= RESULT SECTION ================= -->
    <div class="results">

        <!-- If prediction is SPAM -->
        {% if prediction == 1 %}
            <h1>
                Prediction: 
                <span class="danger">
                    ⚠️ This message is SPAM
                </span>
            </h1>

            <!-- Spam GIF -->
            <img 
                class="gif" 
                src="{{ url_for('static', filename='spam.gif') }}" 
                alt="Spam Message Image"
            >

        <!-- If prediction is NOT SPAM -->
        {% elif prediction == 0 %}
            <h1>
                Prediction: 
                <span class="safe">
                    ✅ This message is NOT SPAM
                </span>
            </h1>

            <!-- Not Spam GIF -->
            <img 
                class="gif" 
                src="{{ url_for('static', filename='not-spam.gif') }}" 
                alt="Not Spam Message Image"
            >
        {% endif %}

    </div>

</body>
</html>
